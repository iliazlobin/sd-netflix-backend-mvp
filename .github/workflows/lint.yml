# Netflix MVP — Lint
# Runs ruff check + ruff format on every PR to main.

name: lint

on:
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: uv tool install ruff

      - name: ruff check
        run: ruff check src/ tests/ verify/

      - name: ruff format check
        run: ruff format src/ tests/ verify/ --check
