# Netflix MVP — Lint
# Runs ruff check + ruff format on every PR to main.

name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

env:
  PYTHON_VERSION: "3.12"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.20"

      - name: ruff check
        run: ruff check src/ tests/ verify/

      - name: ruff format check
        run: ruff format src/ tests/ verify/ --check
