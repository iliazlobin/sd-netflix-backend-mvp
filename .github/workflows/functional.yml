# Netflix MVP — Functional tests
# Uses GitHub Actions Postgres service, runs migrations, starts uvicorn,
# and executes acceptance tests. No Docker Compose needed in CI.
# App start + healthcheck + tests are consolidated in ONE step to avoid
# nohup/orphan-process issues between GHA steps.

name: functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

env:
  APP_PORT: 8050
  PYTHON_VERSION: "3.12"
  DATABASE_URL: postgresql+asyncpg://netflix:netflix@localhost:5432/netflix
  POSTGRES_USER: netflix
  POSTGRES_PASSWORD: netflix
  POSTGRES_DB: netflix
  # Mock segment files live at the repo root; default /app/data/segments only exists in Docker.
  MOCK_SEGMENTS_DIR: ${{ github.workspace }}/data/segments

jobs:
  acceptance:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: netflix
          POSTGRES_PASSWORD: netflix
          POSTGRES_DB: netflix
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U netflix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install project with dev extras
        run: uv sync --extra dev

      - name: Copy env
        run: cp .env.example .env

      - name: Run migrations (including seed data)
        run: uv run alembic upgrade head

      - name: Start app, wait for health, run acceptance tests
        run: |
          set -e
          # Start uvicorn in background within this step's shell
          PYTHONPATH=src uv run uvicorn netflix.main:app \
            --host 0.0.0.0 --port 8000 \
            --log-level info > /tmp/uvicorn.log 2>&1 &
          UVICORN_PID=$!
          echo "uvicorn PID=$UVICORN_PID"

          # Wait for health
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "App is healthy after $((i * 2)) seconds"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to become healthy after 60 seconds"
              cat /tmp/uvicorn.log
              kill $UVICORN_PID 2>/dev/null || true
              exit 1
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

          # Run acceptance tests
          API_BASE_URL=http://localhost:8000 uv run pytest verify/acceptance -q -v

          # Cleanup
          kill $UVICORN_PID 2>/dev/null || true

      - name: Collect logs on failure
        if: failure()
        run: |
          cat /tmp/uvicorn.log 2>/dev/null || echo "No uvicorn log"
          echo "=== pytest output ==="
          # The test output went to stdout in the previous step,
          # but let's also check for any leftover logs

      - name: Teardown
        if: always()
        run: |
          pkill -f "uvicorn netflix.main" 2>/dev/null || true
