services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: netflix
      POSTGRES_PASSWORD: netflix
      POSTGRES_DB: netflix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netflix"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports published — app connects over the compose network.
    # Publishing 5432 would collide with any Postgres already running
    # on the host.

  app:
    build: .
    ports:
      - "${APP_PORT:-8010}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://netflix:netflix@db:5432/netflix
      HOST: "0.0.0.0"
      PORT: "8000"
      LOG_LEVEL: "INFO"
      CORS_ORIGINS: "*"
      MOCK_SEGMENTS_DIR: /app/data/segments
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
