# Netflix MVP — Docker Compose
# Slug: netflix
# Binds to host port $APP_PORT (default 8010). Override with APP_PORT=8050.

services:
  db:
    container_name: netflix-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: netflix
      POSTGRES_PASSWORD: netflix
      POSTGRES_DB: netflix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netflix"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - netflix-net
    # No ports published — app connects over the compose network.
    # Publishing 5432 would collide with any Postgres already running
    # on the host.

  app:
    container_name: netflix-app
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://netflix:netflix@db:5432/netflix
      HOST: "0.0.0.0"
      PORT: "8000"
      LOG_LEVEL: "INFO"
      CORS_ORIGINS: "*"
      MOCK_SEGMENTS_DIR: /app/data/segments
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - netflix-net

volumes:
  pgdata:

networks:
  netflix-net:
    driver: bridge
